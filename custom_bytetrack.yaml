tracker_type: bytetrack  # 追踪器类型
# 阈值设置
track_high_thresh: 0.5   # 第一次接客门槛：置信度大于 0.5 的框才建立新档案
track_low_thresh: 0.1    # 老客户门槛：一旦建立了档案，后续只要它有 0.1 的置信度，就死死咬住不放！
new_track_thresh: 0.6    # 确认门槛：必须非常清晰（>0.6）才能分配新 ID

# 🚨 终极魔法：记忆时长参数！
track_buffer: 90         # 轨迹保留帧数！(默认30)。按 30 帧/秒算，现在它能记住你 3 秒钟的消失！

match_thresh: 0.8        # 匹配阈值（值越大，允许目标移动的速度越快）